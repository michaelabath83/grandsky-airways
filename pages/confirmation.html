<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Confirmation — GrandSky Airways</title>
	<link rel="stylesheet" href="../css/global.css" />
	<link rel="stylesheet" href="../css/payment.css" />
</head>
<body>
	<nav class="nav scrolled"><a href="../index.html" class="nav-logo">GrandSky<span>Airways</span></a></nav>
	<main class="container" style="padding:28px">
		<h1 id="confTitle">Booking Confirmation</h1>
		<p id="confRef" style="font-size:20px;margin-top:8px"></p>
		<div id="statusBadge" style="margin:12px 0"></div>

		<section id="flightBox"></section>
		<p id="confMsg">Your payment is under review. You will receive an email once confirmed. This usually takes 1–24 hours.</p>
		<div style="margin-top:18px">
			<button id="checkStatus" class="btn">Check Status</button>
			<button id="downloadTicket" class="btn" style="display:none">Download Ticket</button>
		</div>
	</main>
	<div id="toast"></div>
	<script type="module">
		// jsPDF loaded by CDN
	</script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
	<script type="module">
		import { supabase } from '../js/supabase-config.js';

		function getParam(name) { const u = new URL(location.href); return u.searchParams.get(name); }
		function showBadge(status) {
			const el = document.getElementById('statusBadge');
			const map = {
				pending_payment: ['bg-gold','Pending payment'],
				payment_submitted: ['bg-slate','Payment submitted'],
				payment_approved: ['bg-success','Payment approved'],
				ticket_sent: ['bg-success','Ticket sent ✓'],
				payment_rejected: ['bg-danger','Payment rejected'],
				cancelled: ['bg-slate','Cancelled']
			};
			const v = map[status] || ['bg-slate', status];
			el.innerHTML = `<span class="badge ${v[0]}">${v[1]}</span>`;
		}

		async function load() {
			const ref = getParam('ref');
			if (!ref) return;
			document.getElementById('confRef').textContent = `Your Booking Reference: ${ref}`;
			
			// Query bookings by booking_ref using Supabase
			const { data, error } = await supabase
				.from('bookings')
				.select('*')
				.eq('booking_ref', ref)
				.single();
			
			if (error || !data) return;
			const b = data;
			showBadge(b.status);
			const fb = document.getElementById('flightBox');
			
			// Parse flight_json or use flight object
			let f = {};
			if (typeof b.flight_json === 'string') {
				try { f = JSON.parse(b.flight_json); } catch(e) {}
			} else if (b.flight_json) {
				f = b.flight_json;
			}
			
			// Defensively resolve flight fields (data may come from different sources)
			const fromLabel = f.fromCity || f.from || f.from_city || f.from_code || b.from_city || '';
			const toLabel = f.toCity || f.to || f.to_city || f.to_code || b.to_city || '';
			const departDate = f.departDate || f.depart_date || f.date || b.depart_date || '';
			const depTime = f.dep || f.depart || f.depTime || f.depart_time || '';
			const arrTime = f.arr || f.arrival || f.arrTime || f.arrival_time || '';

			if (fromLabel || toLabel || departDate) {
				fb.innerHTML = `
					<div class="flight-summary-card">
						<div class="fs-route">${fromLabel || '—'} &nbsp;→&nbsp; ${toLabel || '—'}</div>
						<div class="fs-times">${departDate ? departDate + ' · ' : ''}${depTime ? depTime + ' → ' : ''}${arrTime ? arrTime : ''}</div>
					</div>
				`;
			} else {
				fb.innerHTML = `<div class="flight-summary-card"><div class="fs-route">Flight details unavailable</div></div>`;
			}
			
			// Show download if ticket_sent
			if (b.status === 'ticket_sent') {
				document.getElementById('downloadTicket').style.display = 'inline-block';
			}
		}

		document.getElementById('checkStatus').addEventListener('click', async () => {
			const ref = getParam('ref');
			if (!ref) return;
			
			const { data, error } = await supabase
				.from('bookings')
				.select('*')
				.eq('booking_ref', ref)
				.single();
			
			if (error || !data) return;
			const b = data;
			
			if (b.status === 'payment_submitted') {
				document.getElementById('confMsg').textContent = 'Pending confirmation...';
				document.getElementById('flightBox').scrollIntoView({ behavior: 'smooth' });
				const btn = document.getElementById('checkStatus');
				btn.textContent = 'View Flight Details';
				btn.onclick = () => {
					let f = {};
					if (typeof b.flight_json === 'string') {
						try { f = JSON.parse(b.flight_json); } catch(e) {}
					} else if (b.flight_json) {
						f = b.flight_json;
					}
					const from = encodeURIComponent(f.from || f.from_city || b.from_city || '');
					const to = encodeURIComponent(f.to || f.to_city || b.to_city || '');
					window.location.href = `flights.html?from=${from}&to=${to}`;
				};
				return;
			}
			
			if (b.status === 'payment_approved' || b.status === 'ticket_sent') {
				showBadge(b.status);
				document.getElementById('confMsg').textContent = 'Payment confirmed — your ticket is available.';
				document.getElementById('downloadTicket').style.display = 'inline-block';
				return;
			}
			
			load();
		});
		document.getElementById('downloadTicket').addEventListener('click', async () => {
			const ref = getParam('ref');
			const q = query(collection(db,'bookings'), where('bookingRef','==',ref));
			const snaps = await getDocs(q);
			if (snaps.empty) return;
			const bookingId = snaps.docs[0].id;
			// find ticket
			const t = query(collection(db,'tickets'), where('bookingId','==',bookingId));
			const tdocs = await getDocs(t);
			if (tdocs.empty) return alert('Ticket not found');
			const ticket = tdocs.docs[0].data();
			// regenerate PDF using basic template via jsPDF if available
			if (window.jspdf && window.jspdf.jsPDF) {
				const { jsPDF } = window.jspdf;
				const docp = new jsPDF();
				docp.setFontSize(16); docp.text('GrandSky Airways', 20, 20);
				docp.text(`Ticket: ${ticket.ticketNumber}`,20,36);
				docp.text(`Booking Ref: ${ticket.bookingRef}`,20,44);
				docp.save(`ticket-${ticket.bookingRef}.pdf`);
			} else {
				alert('PDF generator not loaded');
			}
		});

		load();
	</script>
</body>
</html>
